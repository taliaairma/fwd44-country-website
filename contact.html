    <main id="main-content">
      <!-- Contact Form -->
      <section class="contact-form">
        <h2>Want More China?</h2>
        <p>
          Drop your email and favorite season — we'll send you fun facts and
          travel inspiration (no spam, promise).
        </p>

        <form action="#" method="post">
          <div>
            <label for="name">Your name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="e.g., Peter Panda"
            />
          </div>

          <div>
            <label for="email"
              >Email address <span aria-hidden="true">*</span></label
            >
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="peterpanda@bamboo.cn"
            />
          </div>

          <div>
            <label for="season-fav">Favorite season in China?</label>
            <select name="season" id="season-fav">
              <option value="">Pick one:</option>
              <option value="spring">
                Spring — Cherry blossoms & misty valleys
              </option>
              <option value="summer">
                Summer — Rainbow mountains & long days
              </option>
              <option value="autumn">Autumn — Golden Great Wall</option>
              <option value="winter">
                Winter — Ice festivals & snow monkeys
              </option>
            </select>
          </div>

          <div>
            <label for="message">Anything else you'd like to know?</label>
            <textarea
              name="message"
              id="message"
              rows="3"
              placeholder="e.g., Tell me more about pandas!"
            ></textarea>
          </div>

          <div>
            <button type="submit">Send</button>
          </div>
        </form>
      </section>
    </main>
